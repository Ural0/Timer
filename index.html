<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeit-Management Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 260px; }
        .sidebar-collapsed { width: 80px !important; }
        .sidebar-collapsed span { display: none; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #f1f5f9; padding: 1.5rem; }
        .btn-primary { background: #4f46e5; color: white; padding: 0.5rem 1rem; border-radius: 10px; transition: all 0.2s; font-weight: 600; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR (LINKS) -->
    <aside id="sidebar" class="bg-white border-r border-slate-200 flex flex-col h-full z-50">
        <div class="p-6 flex items-center justify-between">
            <h1 class="font-bold text-xl text-indigo-600 truncate"><span>ZeitPro</span></h1>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg">
                <i data-lucide="menu"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
            <button onclick="showPage('clock', 'Uhrzeit')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600 transition-colors">
                <i data-lucide="clock" class="mr-3"></i> <span>Uhrzeit</span>
            </button>
            <button onclick="showPage('world-clock', 'Weltuhr')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="globe" class="mr-3"></i> <span>Weltuhr</span>
            </button>
            <button onclick="showPage('pomodoro', 'Pomodoro')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="brain" class="mr-3"></i> <span>Pomodoro</span>
            </button>
            <button onclick="showPage('countdowns', 'Countdowns')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="hourglass" class="mr-3"></i> <span>Countdowns</span>
            </button>
            <button onclick="showPage('stopwatch', 'Stoppuhr')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="timer" class="mr-3"></i> <span>Stoppuhr</span>
            </button>
            <button onclick="showPage('expiry', 'Ablaufdatum')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="calendar-x" class="mr-3"></i> <span>Ablaufdatum</span>
            </button>
            <button onclick="showPage('age-calc', 'Alter Rechner')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="user" class="mr-3"></i> <span>Alter Rechner</span>
            </button>
            <button onclick="showPage('date-calc', 'Datum Rechner')" class="w-full flex items-center p-3 hover:bg-indigo-50 rounded-xl text-slate-600 hover:text-indigo-600">
                <i data-lucide="calendar" class="mr-3"></i> <span>Datum Rechner</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div id="mini-clock" class="text-xs font-mono text-slate-400 text-center"></div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto relative bg-slate-50">
        <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 p-6 z-40">
            <h2 id="page-title" class="text-2xl font-bold text-slate-800">Uhrzeit</h2>
        </header>

        <div class="p-8 max-w-5xl mx-auto">
            
            <!-- UHRZEIT -->
            <section id="clock" class="page active">
                <div class="card text-center py-20">
                    <div id="main-time" class="text-8xl font-bold text-indigo-600 tracking-tighter">00:00:00</div>
                    <div id="main-date" class="text-xl text-slate-500 mt-4">Wird geladen...</div>
                </div>
            </section>

            <!-- WELTUHR -->
            <section id="world-clock" class="page">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="world-container">
                    <!-- Cities via JS -->
                </div>
            </section>

            <!-- COUNTDOWNS (MEHRERE) -->
            <section id="countdowns" class="page">
                <div class="mb-6 card">
                    <h3 class="font-bold mb-4">Neuen Countdown hinzufügen</h3>
                    <div class="flex flex-wrap gap-4">
                        <input type="text" id="cd-title" placeholder="Titel (z.B. Pasta)" class="border p-2 rounded-lg flex-1 min-w-[200px]">
                        <input type="number" id="cd-min" placeholder="Minuten" class="border p-2 rounded-lg w-24">
                        <button onclick="addCountdown()" class="btn-primary">Hinzufügen</button>
                    </div>
                </div>
                <div id="countdown-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Countdowns via JS -->
                </div>
            </section>

            <!-- ABLAUFDATUM LISTE -->
            <section id="expiry" class="page">
                <div class="card mb-6">
                    <h3 class="font-bold mb-4 text-orange-600">Produkt hinzufügen</h3>
                    <div class="flex flex-wrap gap-4">
                        <input type="text" id="exp-name" placeholder="Produktname" class="border p-2 rounded-lg flex-1">
                        <input type="date" id="exp-date" class="border p-2 rounded-lg">
                        <button onclick="addExpiry()" class="btn-primary bg-orange-500 hover:bg-orange-600">Speichern</button>
                    </div>
                </div>
                <div class="card">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-slate-400 text-sm">
                                <th class="pb-3">Produkt</th>
                                <th class="pb-3">Ablaufdatum</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3">Aktion</th>
                            </tr>
                        </thead>
                        <tbody id="expiry-table-body">
                            <!-- JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- POMODORO -->
            <section id="pomodoro" class="page">
                <div class="max-w-md mx-auto card text-center border-t-8 border-indigo-600">
                    <span id="pomo-label" class="text-sm font-bold uppercase text-slate-400">Fokus</span>
                    <div id="pomo-timer" class="text-7xl font-bold my-6">25:00</div>
                    <div class="flex justify-center gap-4 mb-8">
                        <button onclick="startPomo()" class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:shadow-lg">Start</button>
                        <button onclick="resetPomo()" class="bg-slate-200 px-6 py-2 rounded-full">Reset</button>
                    </div>
                    <canvas id="pomoChart"></canvas>
                </div>
            </section>

            <!-- ALTER RECHNER -->
            <section id="age-calc" class="page">
                <div class="card max-w-md mx-auto">
                    <h3 class="font-bold mb-4">Wie alt bist du?</h3>
                    <input type="text" id="age-name" placeholder="Name" class="border p-2 w-full mb-4 rounded-lg">
                    <input type="date" id="age-dob" class="border p-2 w-full mb-4 rounded-lg">
                    <button onclick="calculateAge()" class="btn-primary w-full">Berechnen & Speichern</button>
                    <div id="age-history" class="mt-8 space-y-2">
                        <!-- History via JS -->
                    </div>
                </div>
            </section>

            <!-- DATUM RECHNER -->
            <section id="date-calc" class="page text-center">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="card">
                        <h4 class="font-bold mb-4">Tage addieren/subtrahieren</h4>
                        <input type="date" id="dc-base" class="border p-2 w-full mb-4 rounded-lg">
                        <input type="number" id="dc-offset" placeholder="Tage (+/-)" class="border p-2 w-full mb-4 rounded-lg">
                        <button onclick="runDateCalc()" class="btn-primary w-full">Rechnen</button>
                        <p id="dc-res" class="mt-4 font-bold text-indigo-600"></p>
                    </div>
                    <div class="card">
                        <h4 class="font-bold mb-4">Intervall berechnen</h4>
                        <input type="date" id="dc-1" class="border p-2 w-full mb-2 rounded-lg">
                        <input type="date" id="dc-2" class="border p-2 w-full mb-4 rounded-lg">
                        <button onclick="runDateDiff()" class="btn-primary w-full">Differenz anzeigen</button>
                        <p id="dc-diff-res" class="mt-4 font-bold text-indigo-600"></p>
                    </div>
                </div>
            </section>

            <!-- STOPPUHR -->
            <section id="stopwatch" class="page">
                <div class="card text-center py-10">
                    <div id="sw-display" class="text-7xl font-mono font-bold mb-8 text-slate-700">00:00:00.00</div>
                    <div class="flex justify-center gap-4">
                        <button id="sw-btn-start" onclick="toggleStopwatch()" class="bg-green-500 text-white px-10 py-3 rounded-xl font-bold">Start</button>
                        <button onclick="resetStopwatch()" class="bg-slate-200 px-10 py-3 rounded-xl font-bold">Reset</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        // --- CORE UI ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
        }

        function showPage(id, title) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title').innerText = title;
            lucide.createIcons();
        }

        // --- UHRZEIT ---
        function updateClock() {
            const now = new Date();
            document.getElementById('main-time').innerText = now.toLocaleTimeString('de-DE');
            document.getElementById('main-date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('mini-clock').innerText = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);

        // --- WELTUHR ---
        const cities = [
            { n: 'Berlin', z: 'Europe/Berlin' },
            { n: 'New York', z: 'America/New_York' },
            { n: 'Tokyo', z: 'Asia/Tokyo' },
            { n: 'London', z: 'Europe/London' },
            { n: 'Istanbul', z: 'Europe/Istanbul' }
        ];
        function updateWorldClock() {
            const container = document.getElementById('world-container');
            if(!container) return;
            container.innerHTML = cities.map(c => `
                <div class="card flex justify-between items-center">
                    <span class="font-bold">${c.n}</span>
                    <span class="font-mono text-xl">${new Date().toLocaleTimeString('de-DE', {timeZone: c.z})}</span>
                </div>
            `).join('');
        }
        setInterval(updateWorldClock, 1000);

        // --- COUNTDOWNS ---
        let countdowns = [
            { id: 1, title: 'Eier kochen', time: 420, active: false },
            { id: 2, title: 'Nudeln', time: 600, active: false }
        ];

        function addCountdown() {
            const title = document.getElementById('cd-title').value || 'Unbekannt';
            const min = parseInt(document.getElementById('cd-min').value) || 0;
            if(min <= 0) return;
            countdowns.push({ id: Date.now(), title, time: min * 60, active: false });
            renderCountdowns();
        }

        function toggleCd(id) {
            const cd = countdowns.find(c => c.id === id);
            cd.active = !cd.active;
            renderCountdowns();
        }

        function deleteCd(id) {
            countdowns = countdowns.filter(c => c.id !== id);
            renderCountdowns();
        }

        function renderCountdowns() {
            const container = document.getElementById('countdown-list');
            container.innerHTML = countdowns.map(c => {
                const m = Math.floor(c.time / 60);
                const s = c.time % 60;
                return `
                    <div class="card flex flex-col items-center border-l-4 ${c.active ? 'border-green-500' : 'border-indigo-500'}">
                        <span class="font-bold text-slate-500 uppercase text-xs mb-2">${c.title}</span>
                        <div class="text-4xl font-mono font-bold mb-4">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
                        <div class="flex gap-2 w-full">
                            <button onclick="toggleCd(${c.id})" class="flex-1 py-1 rounded bg-slate-100 hover:bg-slate-200 text-sm font-bold">
                                ${c.active ? 'Pause' : 'Start'}
                            </button>
                            <button onclick="deleteCd(${c.id})" class="p-2 rounded bg-red-50 text-red-500 hover:bg-red-100">
                                <i data-lucide="trash-2" size="16"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        setInterval(() => {
            countdowns.forEach(c => {
                if(c.active && c.time > 0) {
                    c.time--;
                    if(c.time === 0) {
                        c.active = false;
                        alert(`Time's up: ${c.title}`);
                    }
                }
            });
            renderCountdowns();
        }, 1000);

        // --- ABLAUFDATUM ---
        let expiryItems = JSON.parse(localStorage.getItem('expiry_list') || '[]');
        function addExpiry() {
            const name = document.getElementById('exp-name').value;
            const date = document.getElementById('exp-date').value;
            if(!name || !date) return;
            expiryItems.push({ id: Date.now(), name, date });
            localStorage.setItem('expiry_list', JSON.stringify(expiryItems));
            renderExpiry();
        }
        function deleteExp(id) {
            expiryItems = expiryItems.filter(i => i.id !== id);
            localStorage.setItem('expiry_list', JSON.stringify(expiryItems));
            renderExpiry();
        }
        function renderExpiry() {
            const tbody = document.getElementById('expiry-table-body');
            tbody.innerHTML = expiryItems.map(item => {
                const diff = new Date(item.date) - new Date();
                const days = Math.ceil(diff / (1000*60*60*24));
                let statusCls = days < 0 ? 'text-red-500' : (days < 5 ? 'text-orange-500' : 'text-green-500');
                return `
                    <tr class="border-b last:border-0 hover:bg-slate-50 transition-colors">
                        <td class="py-4 font-semibold">${item.name}</td>
                        <td class="py-4 text-slate-500">${new Date(item.date).toLocaleDateString('de-DE')}</td>
                        <td class="py-4 font-bold ${statusCls}">${days < 0 ? 'Abgelaufen' : days + ' Tage'}</td>
                        <td class="py-4"><button onclick="deleteExp(${item.id})" class="text-red-400 hover:text-red-600"><i data-lucide="x-circle"></i></button></td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        // --- ALTER RECHNER ---
        let ageLogs = JSON.parse(localStorage.getItem('age_logs') || '[]');
        function calculateAge() {
            const name = document.getElementById('age-name').value || 'Anonym';
            const dob = new Date(document.getElementById('age-dob').value);
            if(isNaN(dob)) return;
            const diff = new Date() - dob;
            const age = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            const result = `${age} Jahre`;
            ageLogs.push({ name, result, date: new Date().toLocaleDateString('de-DE') });
            localStorage.setItem('age_logs', JSON.stringify(ageLogs));
            renderAge();
        }
        function renderAge() {
            document.getElementById('age-history').innerHTML = ageLogs.map(l => `
                <div class="p-2 bg-slate-50 rounded flex justify-between text-sm">
                    <span><b>${l.name}</b>: ${l.result}</span>
                    <span class="text-slate-400">${l.date}</span>
                </div>
            `).reverse().join('');
        }

        // --- STOPPUHR ---
        let swTime = 0, swInterval, swRunning = false;
        function toggleStopwatch() {
            const btn = document.getElementById('sw-btn-start');
            if(!swRunning) {
                swInterval = setInterval(() => {
                    swTime += 10;
                    const d = new Date(swTime);
                    document.getElementById('sw-display').innerText = d.toISOString().substr(14, 8) + "." + Math.floor(d.getMilliseconds()/10);
                }, 10);
                btn.innerText = 'Pause'; btn.className = "bg-orange-500 text-white px-10 py-3 rounded-xl font-bold";
            } else {
                clearInterval(swInterval);
                btn.innerText = 'Start'; btn.className = "bg-green-500 text-white px-10 py-3 rounded-xl font-bold";
            }
            swRunning = !swRunning;
        }
        function resetStopwatch() {
            clearInterval(swInterval);
            swTime = 0; swRunning = false;
            document.getElementById('sw-display').innerText = "00:00:00.00";
            document.getElementById('sw-btn-start').innerText = 'Start';
        }

        // --- DATUM RECHNER ---
        function runDateCalc() {
            const b = new Date(document.getElementById('dc-base').value);
            const o = parseInt(document.getElementById('dc-offset').value);
            if(isNaN(b) || isNaN(o)) return;
            b.setDate(b.getDate() + o);
            document.getElementById('dc-res').innerText = "Ergebnis: " + b.toLocaleDateString('de-DE');
        }
        function runDateDiff() {
            const d1 = new Date(document.getElementById('dc-1').value);
            const d2 = new Date(document.getElementById('dc-2').value);
            if(isNaN(d1) || isNaN(d2)) return;
            const diff = Math.abs(d2 - d1);
            document.getElementById('dc-diff-res').innerText = Math.ceil(diff/(1000*60*60*24)) + " Tage Differenz";
        }

        // --- POMODORO ---
        let pomoT = 25*60, pomoI, pomoLogs = JSON.parse(localStorage.getItem('pomo_logs') || '[]');
        function startPomo() {
            clearInterval(pomoI);
            pomoI = setInterval(() => {
                pomoT--;
                let m = Math.floor(pomoT/60), s = pomoT%60;
                document.getElementById('pomo-timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(pomoT <= 0) {
                    clearInterval(pomoI);
                    pomoLogs.push(new Date().toLocaleDateString('de-DE'));
                    localStorage.setItem('pomo_logs', JSON.stringify(pomoLogs));
                    alert("Pomodoro fertig!");
                }
            }, 1000);
        }
        function resetPomo() { clearInterval(pomoI); pomoT = 25*60; document.getElementById('pomo-timer').innerText = "25:00"; }

        // Start
        updateClock();
        renderCountdowns();
        renderExpiry();
        renderAge();
        lucide.createIcons();
    </script>
</body>
</html>
